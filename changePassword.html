<!DOCTYPE html>
<html>

<head>
<title>Change Password</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#0a3d62;
}

.box{

    width:300px;
    margin:100px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    text-align:center;
}

input{

    width:90%;
    padding:10px;
    margin:5px;
}

button{

    width:95%;
    padding:10px;
    background:#0a3d62;
    color:white;
    border:none;
}

</style>

</head>

<body>

<div class="box">

<h2>Change Password</h2>

<input id="old" type="password" placeholder="Old password">

<input id="new" type="password" placeholder="New password">

<button onclick="change()">Change</button>

</div>

<script>

let savedPass =
localStorage.getItem("pass") || "1234";

function change(){

let old =
document.getElementById("old").value;

let newp =
document.getElementById("new").value;

if(old == savedPass){

localStorage.setItem("pass", newp);

alert("Password changed");

window.location="login.html";

}else{

alert("Wrong old password");

}

}

</script>

</body>
</html>
