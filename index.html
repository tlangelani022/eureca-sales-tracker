<!DOCTYPE html>
<html>

<head>

<title>Eureca Sales Tracker</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h2>Eureca Daily Sales Tracker</h2>

Total Profit: R <span id="totalSales">0</span>

<br><br>

<input id="product" placeholder="Product">

<input id="quantity" placeholder="Quantity">

<input id="cost" placeholder="Cost price">

<input id="price" placeholder="Selling price">

<input id="date" type="date">

<br><br>

<button onclick="addSale()">Add Sale</button>

<button onclick="report()">Report</button>

<button onclick="logout()">Logout</button>

<br><br>

<table id="salesTable" border="1">

<tr>
<th>Product</th>
<th>Qty</th>
<th>Cost</th>
<th>Price</th>
<th>Profit</th>
<th>Date</th>
<th>Action</th>
</tr>

</table>

<script src="script.js"></script>

</body>
</html>
