<!DOCTYPE html>
<html>

<head>

<title>Eureca Sales Tracker</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Eureca Business Dashboard</h1>

<div class="cards">

<div class="card">
<h3>Total Profit</h3>
<p id="totalSales">0</p>
</div>

<div class="card">
<h3>Weekly Profit</h3>
<p id="weekProfit">0</p>
</div>

<div class="card">
<h3>Monthly Profit</h3>
<p id="monthProfit">0</p>
</div>

</div>


<div class="formBox">

<select id="product">
<option value="">Select Product</option>
</select>

<input id="quantity" placeholder="Quantity">

<input id="cost" placeholder="Cost">

<input id="price" placeholder="Price">

<input id="date" type="date">

<button onclick="addSale()">Add Sale</button>

<button onclick="report()">Report</button>

<button onclick="products()">Products</button>

<button onclick="logout()">Logout</button>

</div>


<table id="salesTable">

<tr>
<th>Product</th>
<th>Qty</th>
<th>Cost</th>
<th>Price</th>
<th>Profit</th>
<th>Date</th>
<th>Action</th>
</tr>

</table>


<script src="script.js"></script>

</body>
</html>
