<!DOCTYPE html>
<html>

<head>
<title>Login - Eureca Tracker</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#0a3d62;
}

.login-box{

    width:300px;
    margin:100px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 0 10px black;

}

h2{
    margin-bottom:20px;
}

input{

    width:90%;
    padding:10px;
    margin:5px;
}

button{

    width:95%;
    padding:10px;
    background:#0a3d62;
    color:white;
    border:none;
    cursor:pointer;

}

button:hover{

    background:#3c6382;

}

.forgot{

    display:block;
    margin-top:10px;
    color:#0a3d62;
    cursor:pointer;
    font-size:14px;

}

</style>

</head>

<body>

<div class="login-box">

<h2>Eureca Login</h2>

<input id="user" placeholder="Username">

<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<span class="forgot" onclick="forgot()">Forgot Password?</span>

</div>

<script>

function login(){

let u =
document.getElementById("user").value;

let p =
document.getElementById("pass").value;

if(u=="admin" && p=="1234"){

localStorage.setItem("login","true");

window.location="index.html";

}else{

alert("Wrong login");

}

}


function forgot(){

alert("Please contact admin to reset password");

}

</script>

</body>
</html>
